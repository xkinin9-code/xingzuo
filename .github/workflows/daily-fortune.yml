name: Daily Fortune Generation

on:
  schedule:
    # UTC 16:00 = 北京时间 00:00（每天凌晨12点自动更新）
    - cron: '0 16 * * *'
  workflow_dispatch:
    # 支持在 GitHub Actions 页面手动触发

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate daily fortune
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: npx tsx scripts/generate-cache.ts

      - name: Verify today's cache exists
        run: |
          node -e "
            const fs = require('fs');
            const d = new Date();
            d.setTime(d.getTime() + 8 * 60 * 60 * 1000);
            const today = d.toISOString().slice(0, 10);
            const path = '.cache/daily-fortune/' + today + '.json';
            if (!fs.existsSync(path)) {
              console.error('ERROR: Cache file not found:', path);
              process.exit(1);
            }
            const cache = JSON.parse(fs.readFileSync(path, 'utf-8'));
            const zodiacs = Object.keys(cache.fortunes || {});
            if (zodiacs.length < 12) {
              console.error('ERROR: Only', zodiacs.length, '/12 zodiacs found');
              process.exit(1);
            }
            console.log('Cache verified:', today, '-', zodiacs.length, 'zodiacs');
          "

      - name: Regenerate static API file
        run: npx tsx scripts/prepare-static-api.ts

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .cache/daily-fortune/ public/api/fortune/today.json
          git diff --cached --quiet || (
            git commit -m "auto: daily fortune $(date -u -d '+8 hours' +%Y-%m-%d)" &&
            git push
          )
