name: Daily Fortune Generation

on:
  schedule:
    # UTC 16:00 = 北京时间 00:00（每天凌晨12点自动更新）
    - cron: '0 16 * * *'
  workflow_dispatch:
    # 支持在 GitHub Actions 页面手动触发

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate daily fortune
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: npx tsx scripts/generate-cache.ts

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .cache/daily-fortune/
          git diff --cached --quiet || (
            git commit -m "auto: daily fortune $(date +%Y-%m-%d)" &&
            git push
          )
